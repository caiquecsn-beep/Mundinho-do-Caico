<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundinho do Caico | Premium</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-deep: #0f111a;
  --bg-card: #1a1d29;
  --accent: #8b5cf6;
  --accent-soft: #2d2b45;
  --text-main: #f1f1f7;
  --text-dim: #94a3b8;
  --border: rgba(255, 255, 255, 0.08);
  --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

body { 
  font-family: 'Inter', system-ui, -apple-system, sans-serif; 
  background: var(--bg-deep); 
  color: var(--text-main); 
  line-height: 1.5;
}

/* LAYOUT PREMIUM */
.app { display: flex; height: 100vh; overflow: hidden; background: radial-gradient(circle at top right, #1e1b33 0%, #0f111a 100%); }

/* SIDEBAR INSPIRADA NO CANVA */
.sidebar {
  width: 240px; flex-shrink: 0; background: rgba(26, 29, 41, 0.6);
  backdrop-filter: blur(12px); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 24px 12px; gap: 8px;
}

.sidebar-logo {
  font-size: 15px; font-weight: 800; color: var(--accent);
  padding: 0 12px 24px; letter-spacing: -0.5px;
  text-transform: uppercase;
}

.tab {
  display: flex; align-items:center; gap: 12px; padding: 12px 16px;
  cursor: pointer; border-radius: 12px; color: var(--text-dim);
  font-size: 14px; font-weight: 500; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.tab:hover { background: rgba(255,255,255,0.05); color: #fff; }
.tab.active { background: var(--accent); color: #fff; box-shadow: var(--shadow-lg); }

/* GRID DE CARDS (Estilo Canva/Lojong) */
.main-content { flex: 1; overflow-y: auto; padding: 40px; }
.home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }

.home-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px;
  padding: 32px 24px; cursor: pointer; transition: all 0.3s ease;
  display: flex; flex-direction: column; gap: 16px;
  box-shadow: var(--shadow-sm);
}

.home-card:hover { 
  transform: translateY(-8px); border-color: var(--accent); 
  box-shadow: 0 20px 30px -10px rgba(139, 92, 246, 0.2); 
}

.hc-icon { 
    width: 48px; height: 48px; background: var(--accent-soft); 
    border-radius: 16px; display: flex; align-items: center; 
    justify-content: center; font-size: 24px;
}

.hc-name { font-size: 16px; font-weight: 700; color: #fff; }
.hc-desc { font-size: 13px; color: var(--text-dim); }

/* BOTÕES E INPUTS */
.btn {
  background: var(--accent); color: #fff; border: none; border-radius: 14px;
  padding: 12px 24px; font-weight: 600; cursor: pointer; transition: filter 0.2s;
}
.btn:hover { filter: brightness(1.1); }

input, select, textarea {
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 16px; color: #fff; width: 100%;
}

/* MOBILE ADAPTATION */
@media(max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { 
    width: 100%; height: auto; flex-direction: row; order: 2; 
    padding: 12px; overflow-x: auto; border-right: none; border-top: 1px solid var(--border);
  }
  .tab { flex-direction: column; font-size: 10px; padding: 8px; flex: 1; }
  .sidebar-logo { display: none; }
  .main-content { padding: 20px; order: 1; }
}
</style>
</head>
<body>

<div id="app-content" class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">Mundinho</div>
    <div class="tab active" onclick="showPage('home')">🏠 <span>Home</span></div>
    <div class="tab" onclick="showPage('agenda')">📅 <span>Agenda</span></div>
    <div class="tab" onclick="showPage('faculdade')">🎓 <span>Faculdade</span></div>
    <div class="tab" onclick="showPage('finance')">💰 <span>Finanças</span></div>
    <div class="tab" onclick="showPage('fitness')">💪 <span>Fitness</span></div>
    <div class="tab" onclick="showPage('mental')">🧘 <span>Mental</span></div>
  </nav>

  <main class="main-content">
    <div id="page-home" class="page active">
      <h1 style="font-size: 28px; margin-bottom: 8px;">Olá, Caico</h1>
      <p style="color: var(--text-dim); margin-bottom: 40px;">Como está sua jornada hoje?</p>
      
      <div class="home-grid">
        <div class="home-card" onclick="showPage('agenda')">
          <div class="hc-icon">📅</div>
          <div class="hc-info">
            <div class="hc-name">Agenda</div>
            <div class="hc-desc">Organize seus próximos passos e eventos.</div>
          </div>
        </div>
        </div>
    </div>
  </main>
</div>

<script>
// Mantivemos a lógica funcional do seu Supabase, mas o render() 
// agora deve focar em injetar os dados nas novas classes de card.
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  event.currentTarget.classList.add('active');
}
</script>
</body>
</html>
